<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>거리 측정 시스템</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> 
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* 지도가 나타날 영역의 크기 설정 */
        #map { width: 100%; height: 70vh; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f0f2f5; }
        .info-box { background: white; padding: 20px; border-radius: 10px; margin-top: 15px; line-height: 1.6; }
        .status-msg { font-size: 1.2em; font-weight: bold; margin-top: 10px; }

    </style>
</head>
<body>

    <h2>📍 위치 이동 시뮬레이터</h2>
    <div id="map"></div>

    <div class="info-box">
        <div>🚩 <b>목적지:</b> 영진전문대 백호체육관 (35.89709, 128.6226)</div>
        <div id="coords-display">지도를 클릭하여 현재 위치를 시뮬레이션 하세요.</div>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        // [A] 기준 좌표 설정 (목적지: 백호체육관)
        const targetCoords = [35.89709, 128.6226];
        const ALLOWED_RADIUS = 100; // 허용 반경 100미터

        // [B] 지도 초기화
        // setView([위도, 경도], 줌레벨) : 숫자가 클수록 확대됨 (17~18이 적당)
        const map = L.map('map').setView(targetCoords, 17);

        // [C] 배경 지도(Tile) 입히기 (오픈스트리트맵 사용)
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

        // [D] 목적지에 마커와 100m 반경 원 그리기
        // 마커(핀) 추가
        L.marker(targetCoords).addTo(map).bindPopup("<b>목적지: 백호체육관</b>").openPopup();

        // 100m 원 추가 (시각적 가이드)
        const boundaryCircle = L.circle(targetCoords, {
            color: '#4a90e2',      // 테두리 색
            fillColor: '#4a90e2',  // 채우기 색
            fillOpacity: 0.2,      // 투명도
            radius: ALLOWED_RADIUS // 반지름 (미터 단위)
        }).addTo(map);

        // [E] 클릭 이벤트 처리
        let userMarker; // 클릭 시 나타날 마커를 담을 변수

        map.on('click', function(e) {
            const clickLat = e.latlng.lat;
            const clickLon = e.latlng.lng;

            // 1. 기존 클릭 마커가 있다면 제거하고 새로 생성
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([clickLat, clickLon]).addTo(map);

            // 2. 목적지와의 거리 계산 (Leaflet의 distanceTo 함수 사용)
            // 이 함수는 'Haversine' 공식을 사용하여 두 좌표 사이의 직선 거리를 미터(m)로 줍니다.
            const distance = map.distance(targetCoords, [clickLat, clickLon]);

            // 3. 화면에 정보 업데이트
            const display = document.getElementById('coords-display');
            const status = document.getElementById('status');

            display.innerHTML = `현재 클릭 좌표: ${clickLat.toFixed(5)}, ${clickLon.toFixed(5)}<br>` +
                                `목적지까지 거리: <b>${distance.toFixed(1)}m</b>`;

            // 4. 100m 이내 여부 판정
            if (distance <= ALLOWED_RADIUS) {
                status.innerHTML = "🎯 <span style='color:green'>인증 성공! 100m 이내입니다.</span>";
                status.style.backgroundColor = "#eaffea";
                
                 setTimeout(() => { window.location.href = "https://silver-cranachan-c5d7ce.netlify.app/"; }, 500);
            } else {
                status.innerHTML = "❌ <span style='color:red'>인증 실패! 범위를 벗어났습니다.</span>";
                status.style.backgroundColor = "#ffeaea";
            }
        });
    </script>
</body>
</html>
